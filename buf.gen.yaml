#
# buf code-generation config. v2 format — see
# https://buf.build/docs/configuration/v2/buf-gen-yaml.
#
# Generated Go bindings live in gen/go/ as its own Go module so that
# regeneration churn does not pollute the main module's go.mod.

version: v2
inputs:
  - directory: proto
plugins:
  - remote: buf.build/protocolbuffers/go
    out: gen/go
    opt: paths=source_relative
  - remote: buf.build/grpc/go
    out: gen/go
    opt: paths=source_relative
